<div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-xl mb-4">Adresse de livraison</h2>

  <form (ngSubmit)="placeOrder()">
    <label class="block mb-2">Adresse complète
      <textarea [(ngModel)]="address" name="address" class="w-full border px-2 py-1"></textarea>
    </label>

    <div class="flex justify-end mt-4">
      <button class="bg-green-600 text-white px-4 py-2 rounded">Confirmer la commande</button>
    </div>
  </form>
</div>
