<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-xl mb-4">Créer un compte</h2>
  
  <!-- Error message -->
  <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    {{ error }}
  </div>
  
  <form (ngSubmit)="submit()">
    <label class="block mb-2">Nom
      <input [(ngModel)]="name" name="name" required class="w-full border px-2 py-1" />
    </label>
    <label class="block mb-2">Email
      <input [(ngModel)]="email" name="email" type="email" required class="w-full border px-2 py-1" />
    </label>
    <label class="block mb-4">Mot de passe
      <input type="password" [(ngModel)]="password" name="password" required minlength="6" class="w-full border px-2 py-1" />
    </label>
    <div class="flex gap-2">
      <button type="submit" [disabled]="loading" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 disabled:opacity-50">
        {{ loading ? 'Inscription...' : 'S\'inscrire' }}
      </button>
      <a routerLink="/login" class="text-sm text-gray-600 self-center hover:text-blue-600">Déjà un compte ?</a>
    </div>
  </form>
</div>
