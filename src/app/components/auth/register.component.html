<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-xl mb-4">Créer un compte</h2>
  <form (ngSubmit)="submit()">
    <label class="block mb-2">Nom
      <input [(ngModel)]="name" name="name" class="w-full border px-2 py-1" />
    </label>
    <label class="block mb-2">Email
      <input [(ngModel)]="email" name="email" class="w-full border px-2 py-1" />
    </label>
    <label class="block mb-4">Mot de passe
      <input type="password" [(ngModel)]="password" name="password" class="w-full border px-2 py-1" />
    </label>
    <div class="flex gap-2">
      <button class="bg-green-600 text-white px-3 py-1 rounded">S'inscrire</button>
      <a routerLink="/login" class="text-sm text-gray-600 self-center">Déjà un compte ?</a>
    </div>
  </form>
</div>
