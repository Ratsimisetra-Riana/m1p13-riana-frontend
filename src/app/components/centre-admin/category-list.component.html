<div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
  
  <!-- Header with gradient -->
  <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-5">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
          </svg>
        </div>
        <h2 class="text-xl font-bold text-white">Gestion des catégories</h2>
      </div>
      <button (click)="edit()" 
              class="bg-white text-blue-700 font-semibold px-4 py-2 rounded-lg hover:bg-gray-100 transition-colors duration-200 shadow-md flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
        Nouvelle catégorie
      </button>
    </div>
  </div>

  <!-- Table container -->
  <div class="p-6">
    <table class="w-full text-left">
      <thead>
        <tr class="border-b-2 border-gray-200">
          <th class="py-4 px-3 text-sm font-semibold text-gray-600 uppercase tracking-wider">Nom</th>
          <th class="py-4 px-3 text-sm font-semibold text-gray-600 uppercase tracking-wider">Parent</th>
          <th class="py-4 px-3 text-sm font-semibold text-gray-600 uppercase tracking-wider">Filtres</th>
          <th class="py-4 px-3 text-sm font-semibold text-gray-600 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of categories; let i = index" 
            class="border-b border-gray-100 hover:bg-gray-50 transition-colors duration-200">
          <td class="py-4 px-3">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600 font-semibold">
                {{ c.name.charAt(0).toUpperCase() }}
              </div>
              <span class="font-medium text-gray-800">{{ c.name }}</span>
            </div>
          </td>
          <td class="py-4 px-3">
            <span class="text-gray-600">{{ c.parent?.name || '-' }}</span>
          </td>
          <td class="py-4 px-3">
            <span class="bg-gray-100 text-gray-700 text-sm px-3 py-1.5 rounded-full font-medium">
              {{ c.filters?.length || 0 }} filtre{{ (c.filters?.length || 0) !== 1 ? 's' : '' }}
            </span>
          </td>
          <td class="py-4 px-3">
            <div class="flex items-center gap-2">
              <button (click)="edit(c._id)" 
                      class="text-sm bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-100 transition-colors duration-200 flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                Éditer
              </button>
              <button (click)="remove(c._id)" 
                      class="text-sm bg-red-50 text-red-700 px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors duration-200 flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                Supprimer
              </button>
            </div>
          </td>
        </tr>

        <!-- Empty state -->
        <tr *ngIf="categories?.length === 0">
          <td colspan="4" class="py-12 text-center text-gray-500">
            <div class="flex flex-col items-center">
              <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" 
                      d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
              </svg>
              <p class="text-lg font-medium text-gray-600 mb-2">Aucune catégorie</p>
              <p class="text-sm text-gray-500 mb-4">Commencez par créer votre première catégorie</p>
              <button (click)="edit()" 
                      class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors duration-200">
                Créer une catégorie
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

  

</div>
