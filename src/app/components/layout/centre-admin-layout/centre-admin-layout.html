<div class="flex flex-col min-h-screen bg-gray-50">

  <!-- NAVBAR -->
  <app-navbar (toggleSidebar)="toggleSidebar()"></app-navbar>

  <div class="flex flex-1">

    <!-- SIDEBAR - Minimalist -->
    <div
      [ngClass]="{
        'translate-x-0': sidebarOpen,
        '-translate-x-full': !sidebarOpen
      }"
      class="fixed md:static top-0 bottom-0 left-0 z-40 w-64 bg-white border-r border-gray-200 transform transition-transform duration-300 md:translate-x-0">
      
      <!-- Simple Header -->
      <div class="p-5 border-b border-gray-200">
        <h2 class="font-bold text-gray-800 text-lg">Centre Admin</h2>
        <p class="text-xs text-gray-500 mt-1">Management Panel</p>
      </div>

      <!-- Navigation -->
      <nav class="p-3 space-y-1">
        <a routerLink="/centre-admin/categories" 
           routerLinkActive="bg-gray-100 text-gray-900"
           class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-lg hover:bg-gray-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
          </svg>
          Categories
        </a>

        <a routerLink="/centre-admin/shops" 
           routerLinkActive="bg-gray-100 text-gray-900"
           class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 rounded-lg hover:bg-gray-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
          Gestion boutiques
        </a>
      </nav>
    </div>

    <!-- Overlay -->
    <div *ngIf="sidebarOpen" 
         (click)="toggleSidebar()" 
         class="fixed inset-0 bg-black/30 md:hidden z-30">
    </div>

    <!-- Main Content -->
    <main class="flex-1 p-4 md:p-6 bg-gray-50">
      <router-outlet></router-outlet>
    </main>

  </div>

  <app-footer></app-footer>

</div>
