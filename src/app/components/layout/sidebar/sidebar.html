<div class="flex flex-col h-full overflow-y-auto pt-4 pb-4 bg-white">

  <!-- Main Navigation -->
  <div class="px-4 mb-4">
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Navigation</h3>
    <nav class="space-y-1">
      <a routerLink="/products" 
         routerLinkActive="bg-blue-50 text-blue-700"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-3 py-2 text-sm text-gray-700 rounded-lg hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
        </svg>
        Tous les produits
      </a>
      
      <a routerLink="/shops" 
         routerLinkActive="bg-blue-50 text-blue-700"
         class="flex items-center gap-3 px-3 py-2 text-sm text-gray-700 rounded-lg hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
        Boutiques
      </a>
      
      <a routerLink="/cart" 
         routerLinkActive="bg-blue-50 text-blue-700"
         class="flex items-center gap-3 px-3 py-2 text-sm text-gray-700 rounded-lg hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        Panier
      </a>
      
      <a routerLink="/history" 
         routerLinkActive="bg-blue-50 text-blue-700"
         class="flex items-center gap-3 px-3 py-2 text-sm text-gray-700 rounded-lg hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Mes commandes
      </a>
    </nav>
  </div>

  <!-- Divider -->
  <div class="border-t border-gray-200 mx-4"></div>

  <!-- Category list -->
  <div class="px-4 mt-4">
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Catégories</h3>
    <app-category-list
      (categorySelected)="onCategorySelected($event)">
    </app-category-list>
  </div>

  <!-- Filters panel with smooth Tailwind transition -->
  <div
    class="overflow-hidden transition-all duration-300 ease-in-out transform origin-top px-4 mt-4"
    [ngClass]="{
      'max-h-0 opacity-0 scale-y-0': !selectedCategory,
      'max-h-[1000px] opacity-100 scale-y-100': selectedCategory
    }"
  >
    <app-category-specs
      [category]="selectedCategory"
      (filtersChanged)="onFiltersChanged($event)">
    </app-category-specs>
  </div>

</div>
