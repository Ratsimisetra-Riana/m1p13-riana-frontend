<div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-xl mb-4">Historique des achats</h2>

  <div *ngIf="purchases.length === 0" class="text-gray-600">Aucun achat trouvé.</div>

  <div *ngFor="let p of purchases" class="border-b py-3">
    <div class="flex justify-between">
      <div>
        <div class="font-medium">Commande {{ p.id }}</div>
        <div class="text-sm text-gray-500">{{ p.date | date:'short' }}</div>
      </div>
      <div class="text-sm">{{ p.status }}</div>
    </div>
    <div class="mt-2">
      <div *ngFor="let it of p.items" class="text-sm">{{ it.productName }} x{{ it.quantity }} — {{ it.price | currency }}</div>
    </div>
  </div>
</div>
